<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Jogos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🎮 Info de Jogos</h1>
        <p>Explore os melhores jogos online</p>
    </header>

    <main id="catalogo-container" class="grid-container">
        </main>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <span id="close-modal">&times;</span>
            <h2 id="modal-title">Nome do Jogo</h2>
            <span class="badge" id="modal-genre">Gênero</span>
            <p id="modal-summary">Resumo do jogo vai aqui...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
